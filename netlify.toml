# Netlify configuration for Strength Lab.
# Static-only site — index.html is committed, nothing to build at deploy time.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=(), camera=(), microphone=(), geolocation=()"
    # Dashboard code, data, and Chart.js are inlined into the generated HTML.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"

# Long-cache the bundled HTML — its content hash changes only on rebuild.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
